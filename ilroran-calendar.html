<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ilroran Calendar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Georgia,serif;background:#080710;color:#d4c9b0;min-height:100vh;}
#cal-root{display:flex;flex-direction:column;min-height:100vh;}
.cal-header{background:#0b0916;border-bottom:1px solid rgba(201,162,39,0.2);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.cal-title{font-size:26px;color:#e8c84a;letter-spacing:0.1em;}
.cal-sub{font-size:13px;color:#7a7060;letter-spacing:0.06em;margin-top:2px;}
.cal-body{display:flex;flex:1;min-height:calc(100vh - 57px);}
.sidebar{width:180px;flex-shrink:0;background:#0b0916;border-right:1px solid rgba(201,162,39,0.15);padding:12px 0;display:flex;flex-direction:column;gap:1px;overflow-y:auto;}
.sidebar-label{padding:0 14px 8px;font-size:11px;color:#7a7060;letter-spacing:0.12em;text-transform:uppercase;}
.month-btn{background:transparent;border:none;border-left:3px solid transparent;color:#d4c9b0;padding:7px 14px;text-align:left;cursor:pointer;font-size:14px;font-family:Georgia,serif;display:flex;flex-direction:column;gap:1px;transition:all 0.15s;width:100%;}
.month-btn:hover{background:rgba(201,162,39,0.06);}
.month-btn.active{background:rgba(201,162,39,0.1);color:#e8c84a;}
.mo-season{font-size:11px;color:#5a5040;}
.filter-sec{margin-top:10px;}
.nation-btn{background:transparent;border:1px solid rgba(201,162,39,0.1);border-radius:4px;padding:4px 8px;font-size:12px;cursor:pointer;font-family:Georgia,serif;text-align:left;display:flex;align-items:center;gap:5px;width:calc(100% - 24px);margin:0 12px 3px;transition:all 0.15s;}
.nation-btn:hover{border-color:rgba(201,162,39,0.3);}
.nation-btn.active{background:rgba(201,162,39,0.1);border-color:rgba(201,162,39,0.4);}
.nation-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.main{flex:1;padding:20px;overflow-y:auto;}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.nav-btn{background:transparent;border:1px solid rgba(201,162,39,0.3);color:#c9a227;padding:5px 13px;border-radius:4px;cursor:pointer;font-family:Georgia,serif;font-size:16px;}
.nav-btn:hover{background:rgba(201,162,39,0.08);}
.month-name{font-size:30px;letter-spacing:0.08em;}
.month-meta{font-size:13px;color:#7a7060;margin-top:2px;}
.betrayal-warn{color:#c43a3a;margin-left:8px;}
.day-headers{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;}
.day-header{text-align:center;font-size:12px;color:#5a5040;letter-spacing:0.06em;padding:3px 0;}
.day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.day-cell{background:rgba(255,255,255,0.02);border:1px solid rgba(201,162,39,0.08);border-radius:5px;min-height:80px;padding:5px;cursor:pointer;position:relative;transition:border-color 0.15s;}
.day-cell:hover{border-color:rgba(201,162,39,0.35);}
.day-cell.betrayal{background:rgba(196,58,58,0.05);border-color:rgba(196,58,58,0.18);}
.day-cell.has-events{border-color:rgba(201,162,39,0.22);}
.day-num{font-size:12px;color:#5a5040;margin-bottom:3px;}
.day-cell.betrayal .day-num{color:#c43a3a;}
.ev-pill{border-radius:3px;padding:2px 4px;font-size:11px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.3;margin-bottom:2px;}
.add-plus{position:absolute;bottom:4px;right:5px;font-size:13px;color:rgba(201,162,39,0.18);line-height:1;pointer-events:none;}
.add-plus-sm{position:absolute;bottom:4px;right:5px;font-size:10px;color:rgba(201,162,39,0.3);line-height:1;cursor:pointer;z-index:2;}
.event-list{margin-top:20px;}
.event-list-label{font-size:11px;color:#7a7060;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px;}
.ev-row{background:rgba(255,255,255,0.02);border-radius:5px;padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:5px;transition:background 0.15s;}
.ev-row:hover{background:rgba(255,255,255,0.04);}
.ev-day{font-size:13px;color:#5a5040;min-width:36px;}
.ev-name{font-size:14px;color:#d4c9b0;flex:1;}
.ev-nation{font-size:12px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal{background:#0e0c18;border:1px solid rgba(201,162,39,0.3);border-radius:10px;padding:22px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.8);}
.modal-title{font-size:18px;color:#e8c84a;margin-bottom:4px;}
.modal-sub{font-size:13px;color:#5a5040;margin-bottom:18px;}
.field-label{font-size:12px;color:#7a7060;display:block;margin-bottom:4px;}
.field-input{width:100%;background:#080710;border:1px solid rgba(201,162,39,0.25);color:#d4c9b0;padding:8px 12px;border-radius:4px;font-family:Georgia,serif;font-size:15px;margin-bottom:12px;}
.field-input:focus{outline:none;border-color:rgba(201,162,39,0.5);}
.field-select{width:100%;background:#080710;border:1px solid rgba(201,162,39,0.25);color:#d4c9b0;padding:8px 12px;border-radius:4px;font-family:Georgia,serif;font-size:14px;margin-bottom:12px;}
.field-ta{width:100%;background:#080710;border:1px solid rgba(201,162,39,0.25);color:#d4c9b0;padding:8px 12px;border-radius:4px;font-family:Georgia,serif;font-size:14px;resize:vertical;margin-bottom:14px;}
.btn-row{display:flex;gap:8px;justify-content:flex-end;}
.btn-cancel{background:transparent;border:1px solid rgba(201,162,39,0.2);color:#7a7060;padding:6px 14px;border-radius:4px;cursor:pointer;font-family:Georgia,serif;}
.btn-add{background:rgba(201,162,39,0.15);border:1px solid rgba(201,162,39,0.4);color:#e8c84a;padding:6px 18px;border-radius:4px;cursor:pointer;font-family:Georgia,serif;}
.btn-del{background:rgba(196,58,58,0.1);border:1px solid rgba(196,58,58,0.3);color:#c43a3a;padding:6px 14px;border-radius:4px;cursor:pointer;font-family:Georgia,serif;font-size:12px;}
.btn-close{background:rgba(201,162,39,0.1);border:1px solid rgba(201,162,39,0.3);color:#c9a227;padding:6px 14px;border-radius:4px;cursor:pointer;font-family:Georgia,serif;font-size:12px;}
.nation-badge{display:inline-block;font-size:12px;padding:3px 10px;border-radius:20px;margin-bottom:12px;}
.saving-dot{font-size:12px;color:#c9a227;opacity:0.7;}
.year-input{background:#0e0c18;border:1px solid rgba(201,162,39,0.3);color:#e8c84a;padding:4px 7px;width:72px;border-radius:4px;font-family:Georgia,serif;font-size:15px;text-align:center;}
@media(max-width:600px){
  .sidebar{width:140px;}
  .main{padding:12px;}
  .cal-header{padding:10px 14px;}
}
</style>
</head>
<body>
<div id="cal-root">
  <div class="cal-header">
    <div>
      <div class="cal-title">The Ilroran Calendar</div>
      <div class="cal-sub">385 days · 11 months · 7-day week · ARM / BRM</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="saving-dot" id="saving-ind" style="display:none">saving…</span>
      <span style="font-size:11px;color:#7a7060;">Year</span>
      <input type="number" class="year-input" id="year-input" value="1200">
      <span style="font-size:11px;color:#7a7060;">ARM</span>
    </div>
  </div>
  <div class="cal-body">
    <div class="sidebar" id="sidebar"></div>
    <div class="main" id="main-area"></div>
  </div>
</div>

<div class="overlay" id="add-overlay" style="display:none">
  <div class="modal">
    <div class="modal-title">Add Event</div>
    <div class="modal-sub" id="add-modal-sub"></div>
    <label class="field-label">Event Name</label>
    <input class="field-input" id="ev-name-input" placeholder="Name this event…">
    <label class="field-label">Nation</label>
    <select class="field-select" id="ev-nation-input"></select>
    <label class="field-label">Description</label>
    <textarea class="field-ta" id="ev-desc-input" rows="3" placeholder="Optional description…"></textarea>
    <div class="btn-row">
      <button class="btn-cancel" id="add-cancel">Cancel</button>
      <button class="btn-add" id="add-submit">Add Event</button>
    </div>
  </div>
</div>

<div class="overlay" id="detail-overlay" style="display:none">
  <div class="modal" id="detail-modal-inner">
    <div class="modal-title" id="det-name"></div>
    <div class="modal-sub" id="det-sub"></div>
    <div class="nation-badge" id="det-nation"></div>
    <div style="font-size:14px;color:#d4c9b0;line-height:1.6;margin-bottom:18px;" id="det-desc"></div>
    <div class="btn-row">
      <button class="btn-del" id="det-del">Delete</button>
      <button class="btn-close" id="det-close">Close</button>
    </div>
  </div>
</div>

<script>
const MONTHS=[
  {num:1,name:"Concordance",season:"Deep Winter",color:"#4a90d9"},
  {num:2,name:"Peloris",season:"Late Winter",color:"#7b8fa1"},
  {num:3,name:"Platinum",season:"Early Spring",color:"#9b8fd4"},
  {num:4,name:"Ravene",season:"High Spring",color:"#c47bc4"},
  {num:5,name:"Eryndad",season:"Early Summer",color:"#4ab89a"},
  {num:6,name:"Zenith",season:"Mid-Summer",color:"#d4a843"},
  {num:7,name:"Radiance",season:"Late Summer",color:"#d4732a"},
  {num:8,name:"Iron-Thorne",season:"Early Autumn",color:"#8b6a3e"},
  {num:9,name:"Betrayal",season:"High Autumn",color:"#c43a3a"},
  {num:10,name:"Arclight",season:"Late Autumn",color:"#6a4ab8"},
  {num:11,name:"Respite",season:"Early Winter",color:"#3a7a8a"},
];
const DAYS=["Van","Cast","Hearth","Just","Shield","Crown","Eryn"];
const NCOLS={"World-wide":"#c9a227","Oshary":"#4a9e4a","Elandorr":"#7b6ad4","Oakenguard":"#c47b2a","Rosestar":"#c43a3a","Urag":"#c47bc4"};
const NATIONS=Object.keys(NCOLS);
const DEFAULT=[
  {id:"f1",month:1,day:1,name:"The Rising",nation:"World-wide",description:"New year — celebrated across all of Ilrora."},
  {id:"f2",month:2,day:5,name:"Tide Blessing",nation:"Elandorr",description:"Maritime ritual in Lylmarise blessing the sea routes for the coming year."},
  {id:"f3",month:3,day:10,name:"Kindrick's Day",nation:"Oshary",description:"Honors Aled Kindrick's founding of Kindhaven. Parades, speeches, statues garlanded."},
  {id:"f4",month:4,day:15,name:"The Gathering",nation:"Urag",description:"All tribal leaders convene at Dorgrugh. Part summit, part festival, part competition."},
  {id:"f5",month:5,day:1,name:"Open Market",nation:"Rosestar",description:"The largest trade festival in Ilrora, held in Paarthain. Every nation sends merchants."},
  {id:"f6",month:6,day:1,name:"Liberation Day",nation:"World-wide",description:"Commemorates 0 ARM and the end of the War of Freedom. Humans celebrate loudly. Elves observe quietly."},
  {id:"f7",month:7,day:20,name:"The Five's Feast",nation:"Oshary",description:"A harvest feast honoring all five members of The Five collectively."},
  {id:"f8",month:8,day:1,name:"Iron Week Day 1",nation:"Oakenguard",description:"Forge competitions, craftsmanship displays, and trade fairs begin."},
  {id:"f8b",month:8,day:2,name:"Iron Week Day 2",nation:"Oakenguard",description:"Iron Week continues."},
  {id:"f8c",month:8,day:3,name:"Iron Week Day 3",nation:"Oakenguard",description:"Iron Week continues."},
  {id:"f8d",month:8,day:4,name:"Iron Week Day 4",nation:"Oakenguard",description:"Iron Week continues."},
  {id:"f8e",month:8,day:5,name:"Iron Week Day 5",nation:"Oakenguard",description:"Iron Week continues."},
  {id:"f8f",month:8,day:6,name:"Iron Week Day 6",nation:"Oakenguard",description:"Iron Week continues."},
  {id:"f8g",month:8,day:7,name:"Iron Week Day 7",nation:"Oakenguard",description:"Iron Week — final day."},
  {id:"f9",month:9,day:15,name:"The Vigil",nation:"World-wide",description:"A somber day of remembrance for those lost in the War of Freedom."},
  {id:"f10",month:10,day:28,name:"Sacred Flame",nation:"Elandorr",description:"A night of lanterns and prayer marking the end of the elven holy year."},
  {id:"f11",month:11,day:35,name:"The Long Dark",nation:"World-wide",description:"The final day of the year. A night of reflection before the cycle resets."},
];

const STORE_KEY="ilroran-calendar-v1";
let state={events:[],month:0,year:1200,filter:"All",selDay:null,detId:null};

function uid(){return"e"+Math.random().toString(36).slice(2,9);}

function load(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(raw){const s=JSON.parse(raw);state.events=s.events||JSON.parse(JSON.stringify(DEFAULT));state.month=s.month||0;state.year=s.year||1200;}
    else{state.events=JSON.parse(JSON.stringify(DEFAULT));}
  }catch{state.events=JSON.parse(JSON.stringify(DEFAULT));}
  document.getElementById("year-input").value=state.year;
  render();
}

function persist(){
  const ind=document.getElementById("saving-ind");
  ind.style.display="inline";
  try{localStorage.setItem(STORE_KEY,JSON.stringify({events:state.events,month:state.month,year:state.year}));}catch{}
  setTimeout(()=>{ind.style.display="none";},600);
}

function render(){renderSidebar();renderMain();}

function renderSidebar(){
  const sb=document.getElementById("sidebar");
  let h=`<div class="sidebar-label">Months</div>`;
  MONTHS.forEach((m,i)=>{
    const act=i===state.month;
    h+=`<button class="month-btn${act?" active":""}" onclick="goMonth(${i})" style="${act?`border-left-color:${m.color};color:#e8c84a`:""}">
      <span>${m.name}</span><span class="mo-season">${m.season}</span>
    </button>`;
  });
  h+=`<div class="sidebar-label filter-sec">Filter Nation</div>`;
  ["All",...NATIONS].forEach(n=>{
    const col=n==="All"?"#d4c9b0":NCOLS[n];
    const act=state.filter===n;
    h+=`<button class="nation-btn${act?" active":""}" onclick="setFilter('${n}')" style="color:${col}">
      ${n!=="All"?`<span class="nation-dot" style="background:${col}"></span>`:""}${n}
    </button>`;
  });
  sb.innerHTML=h;
}

function renderMain(){
  const m=MONTHS[state.month];
  const isB=m.num===9;
  const evDay=d=>state.events.filter(e=>e.month===m.num&&e.day===d);
  const monthEvs=state.events.filter(e=>e.month===m.num&&(state.filter==="All"||e.nation===state.filter));

  let dh=DAYS.map(d=>`<div class="day-header">${d}</div>`).join("");
  let cells="";
  for(let i=1;i<=35;i++){
    const evs=evDay(i);const has=evs.length>0;
    let pills=evs.map(ev=>`<div class="ev-pill" style="background:${NCOLS[ev.nation]}22;border:1px solid ${NCOLS[ev.nation]}55;color:${NCOLS[ev.nation]}" onclick="event.stopPropagation();openDetail('${ev.id}')" title="${ev.name.replace(/'/g,"&#39;")}">${ev.name}</div>`).join("");
    cells+=`<div class="day-cell${isB?" betrayal":""}${has?" has-events":""}" onclick="openAdd(${i})">
      <div class="day-num">${i}</div>${pills}
      ${!has?`<div class="add-plus">+</div>`:`<div class="add-plus-sm" onclick="event.stopPropagation();openAdd(${i})">+</div>`}
    </div>`;
  }

  let evList="";
  if(monthEvs.length>0){
    const sorted=[...monthEvs].sort((a,b)=>a.day-b.day);
    evList=`<div class="event-list"><div class="event-list-label">Events this month</div>`;
    sorted.forEach(ev=>{
      evList+=`<div class="ev-row" style="border:1px solid ${NCOLS[ev.nation]}33;border-left:3px solid ${NCOLS[ev.nation]}" onclick="openDetail('${ev.id}')">
        <span class="ev-day">Day ${ev.day}</span>
        <span class="ev-name">${ev.name}</span>
        <span class="ev-nation" style="color:${NCOLS[ev.nation]}">${ev.nation}</span>
      </div>`;
    });
    evList+="</div>";
  }

  document.getElementById("main-area").innerHTML=`
    <div class="month-nav">
      <button class="nav-btn" onclick="prevMonth()">&#8249;</button>
      <div style="text-align:center">
        <div class="month-name" style="color:${m.color};text-shadow:0 0 30px ${m.color}40">${m.name}</div>
        <div class="month-meta">${m.season} · Month ${m.num} · 35 days${isB?'<span class="betrayal-warn">⚠ Ill omen</span>':""}</div>
      </div>
      <button class="nav-btn" onclick="nextMonth()">&#8250;</button>
    </div>
    <div class="day-headers">${dh}</div>
    <div class="day-grid">${cells}</div>
    ${evList}
  `;
}

function goMonth(i){state.month=i;persist();render();}
function setFilter(n){state.filter=n;render();}
function prevMonth(){if(state.month===0){state.month=10;state.year--;}else state.month--;document.getElementById("year-input").value=state.year;persist();render();}
function nextMonth(){if(state.month===10){state.month=0;state.year++;}else state.month++;document.getElementById("year-input").value=state.year;persist();render();}

function openAdd(day){
  state.selDay=day;
  const m=MONTHS[state.month];
  document.getElementById("add-modal-sub").textContent=`${m.name}, Day ${day} \u00B7 ${state.year} ARM`;
  document.getElementById("ev-name-input").value="";
  document.getElementById("ev-desc-input").value="";
  const sel=document.getElementById("ev-nation-input");
  sel.innerHTML=NATIONS.map(n=>`<option value="${n}">${n}</option>`).join("");
  document.getElementById("add-overlay").style.display="flex";
  setTimeout(()=>document.getElementById("ev-name-input").focus(),50);
}

function openDetail(id){
  const ev=state.events.find(e=>e.id===id);if(!ev)return;
  state.detId=id;
  document.getElementById("det-name").textContent=ev.name;
  document.getElementById("det-sub").textContent=`${MONTHS[ev.month-1].name}, Day ${ev.day} \u00B7 ${state.year} ARM`;
  const nb=document.getElementById("det-nation");
  nb.textContent=ev.nation;nb.style.background=NCOLS[ev.nation]+"22";nb.style.border=`1px solid ${NCOLS[ev.nation]}55`;nb.style.color=NCOLS[ev.nation];
  document.getElementById("det-desc").textContent=ev.description||"";
  document.getElementById("detail-overlay").style.display="flex";
}

document.getElementById("add-cancel").onclick=()=>document.getElementById("add-overlay").style.display="none";
document.getElementById("add-overlay").onclick=e=>{if(e.target===document.getElementById("add-overlay"))document.getElementById("add-overlay").style.display="none";};
document.getElementById("add-submit").onclick=()=>{
  const name=document.getElementById("ev-name-input").value.trim();if(!name)return;
  state.events.push({id:uid(),month:MONTHS[state.month].num,day:state.selDay,name,nation:document.getElementById("ev-nation-input").value,description:document.getElementById("ev-desc-input").value.trim()});
  persist();render();document.getElementById("add-overlay").style.display="none";
};
document.getElementById("det-close").onclick=()=>document.getElementById("detail-overlay").style.display="none";
document.getElementById("detail-overlay").onclick=e=>{if(e.target===document.getElementById("detail-overlay"))document.getElementById("detail-overlay").style.display="none";};
document.getElementById("det-del").onclick=()=>{
  state.events=state.events.filter(e=>e.id!==state.detId);
  persist();render();document.getElementById("detail-overlay").style.display="none";
};
document.getElementById("ev-name-input").onkeydown=e=>{if(e.key==="Enter")document.getElementById("add-submit").click();};
document.getElementById("year-input").onchange=e=>{state.year=parseInt(e.target.value)||1200;persist();};

load();
</script>
</body>
</html>
