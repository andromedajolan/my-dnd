<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tome of Everything</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold:          #c9a227;
  --gold-dark:     #8b6914;
  --gold-light:    #e8c84a;
  --gold-faint:    rgba(201,162,39,0.12);
  --parchment:     #ede0c0;
  --parchment-mid: #d4b98a;
  --parchment-drk: #b09060;
  --ink:           #160c02;
  --crimson:       #6b1010;
  --bg:            #07070d;

  /* Section accent colors */
  --accent-monsters:    #c9a227;
  --accent-spells:      #7b9fd4;
  --accent-magic:       #a87dc2;
  --accent-equipment:   #7ab87a;
  --accent-backgrounds: #d4a574;
  --accent-feats:       #d47a7a;
  --accent-subclasses:  #7ad4c8;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 50% at 15% 0%,   rgba(30,12,60,0.55) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 85% 100%,  rgba(10,25,60,0.45) 0%, transparent 70%);
  min-height: 100vh;
  font-family: 'IM Fell English', Georgia, serif;
  color: var(--gold);
  overflow-x: hidden;
}

/* ── HEADER ─────────────────────────────────────────────────────── */
header {
  text-align: center;
  padding: 3rem 2rem 0;
  position: relative;
}
.site-crown {
  font-size: 1.4rem;
  color: var(--gold-dark);
  letter-spacing: 0.5em;
  opacity: 0.6;
  margin-bottom: 0.4rem;
}
.site-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(1.8rem, 5vw, 3.2rem);
  font-weight: 700;
  color: var(--gold-light);
  text-shadow: 0 0 60px rgba(201,162,39,0.25), 0 2px 6px rgba(0,0,0,0.9);
  letter-spacing: 0.12em;
}
.site-sub {
  font-style: italic;
  color: var(--gold-dark);
  font-size: 0.9rem;
  letter-spacing: 0.08em;
  margin-top: 0.3rem;
  opacity: 0.8;
}

/* ── NAV TABS ────────────────────────────────────────────────────── */
.nav-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  justify-content: center;
  padding: 1.8rem 1.5rem 0;
  max-width: 1400px;
  margin: 0 auto;
}
.nav-tab {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(139,105,20,0.4);
  color: var(--gold-dark);
  font-family: 'Cinzel', serif;
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  padding: 0.55rem 1.1rem;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.nav-tab::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: var(--tab-accent, var(--gold));
  transform: scaleX(0);
  transition: transform 0.2s;
}
.nav-tab:hover { border-color: rgba(201,162,39,0.5); color: var(--gold); }
.nav-tab:hover::before { transform: scaleX(1); }
.nav-tab.active {
  background: rgba(255,255,255,0.06);
  border-color: var(--tab-accent, var(--gold));
  color: var(--gold-light);
}
.nav-tab.active::before { transform: scaleX(1); }

.nav-tab[data-section="monsters"]    { --tab-accent: var(--accent-monsters); }
.nav-tab[data-section="spells"]      { --tab-accent: var(--accent-spells); }
.nav-tab[data-section="magic_items"] { --tab-accent: var(--accent-magic); }
.nav-tab[data-section="equipment"]   { --tab-accent: var(--accent-equipment); }
.nav-tab[data-section="backgrounds"] { --tab-accent: var(--accent-backgrounds); }
.nav-tab[data-section="feats"]       { --tab-accent: var(--accent-feats); }
.nav-tab[data-section="subclasses"]  { --tab-accent: var(--accent-subclasses); }

/* Divider */
.header-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-dark) 20%, var(--gold) 50%, var(--gold-dark) 80%, transparent);
  margin: 1.2rem 10% 0;
}

/* ── CONTROLS ────────────────────────────────────────────────────── */
.controls {
  display: flex;
  gap: 0.8rem;
  padding: 1.4rem 2rem 0.8rem;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  max-width: 1400px;
  margin: 0 auto;
}
.ctrl { position: relative; display: flex; align-items: center; }
.ctrl-icon {
  position: absolute; left: 10px;
  color: var(--gold-dark); font-size: 0.85rem;
  pointer-events: none; z-index: 1;
}
input[type="text"], select {
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(139,105,20,0.5);
  color: var(--gold);
  font-family: 'IM Fell English', Georgia, serif;
  font-size: 0.88rem;
  padding: 0.55rem 0.9rem;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  appearance: none; -webkit-appearance: none;
}
input[type="text"] { padding-left: 2rem; min-width: 260px; }
input[type="text"]::placeholder { color: var(--gold-dark); opacity: 0.55; }
input[type="text"]:focus, select:focus { border-color: var(--gold); background: rgba(255,255,255,0.04); }
select { padding-right: 1.8rem; cursor: pointer; min-width: 130px; }
select option { background: #12121e; color: var(--gold); }
.ctrl-select::after {
  content: '▾'; position: absolute; right: 8px;
  color: var(--gold-dark); pointer-events: none; font-size: 0.7rem;
}

.stats-bar {
  text-align: center;
  color: var(--gold-dark);
  font-size: 0.8rem;
  font-style: italic;
  padding: 0.4rem 0 1rem;
  letter-spacing: 0.05em;
  opacity: 0.75;
}

/* ── GRID ────────────────────────────────────────────────────────── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 1.6rem;
  padding: 0.5rem 2rem 4rem;
  max-width: 1400px;
  margin: 0 auto;
}

/* Wide grid for text-heavy content */
.card-grid.wide {
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
}

/* ── LOADING / EMPTY ─────────────────────────────────────────────── */
.loading {
  grid-column: 1/-1; text-align: center;
  padding: 5rem 2rem;
  font-family: 'Cinzel', serif;
  font-size: 1rem; letter-spacing: 0.15em; color: var(--gold-dark);
}
.loading-ring {
  width: 44px; height: 44px;
  border: 2px solid rgba(139,105,20,0.3);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 1.1s linear infinite;
  margin: 1.2rem auto 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty {
  grid-column: 1/-1; text-align: center;
  padding: 5rem 2rem; font-style: italic; color: var(--gold-dark); opacity: 0.6;
}

/* ── CARD BASE ───────────────────────────────────────────────────── */
.card-wrap {
  cursor: pointer;
  animation: fadeUp 0.4s ease both;
  border-radius: 8px;
  position: relative;
  transition: transform 0.18s ease, box-shadow 0.18s ease;
}
.card-wrap:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 24px rgba(201,162,39,0.1);
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card-wrap:nth-child(1)  { animation-delay: 0.02s; }
.card-wrap:nth-child(2)  { animation-delay: 0.04s; }
.card-wrap:nth-child(3)  { animation-delay: 0.06s; }
.card-wrap:nth-child(4)  { animation-delay: 0.08s; }
.card-wrap:nth-child(5)  { animation-delay: 0.10s; }
.card-wrap:nth-child(6)  { animation-delay: 0.12s; }
.card-wrap:nth-child(n+7){ animation-delay: 0.14s; }

.card {
  width: 100%;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--card-accent, var(--gold-dark));
  box-shadow: inset 0 0 0 1px rgba(201,162,39,0.06), 0 6px 30px rgba(0,0,0,0.6);
  background: rgba(7,7,13,0.92);
}
.card::after {
  content: '';
  position: absolute; inset: 4px;
  border: 1px solid rgba(201,162,39,0.1);
  border-radius: 5px;
  pointer-events: none; z-index: 15;
}

/* Card header */
.card-header {
  position: relative; z-index: 10;
  padding: 0.75rem 1rem 0.6rem;
  background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 100%);
  border-bottom: 1px solid var(--card-accent, rgba(139,105,20,0.5));
}
.card-name {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: clamp(0.82rem, 2.2vw, 1rem);
  color: var(--card-name-color, var(--gold-light));
  text-align: center;
  letter-spacing: 0.08em;
  line-height: 1.2;
}
.card-subtitle {
  font-style: italic;
  font-size: 0.68rem;
  color: rgba(201,162,39,0.6);
  text-align: center;
  letter-spacing: 0.05em;
  margin-top: 2px;
}

/* Card body */
.card-body {
  padding: 0.7rem 1rem;
  min-height: 80px;
}
.card-tags {
  display: flex; flex-wrap: wrap; gap: 0.3rem;
  margin-bottom: 0.5rem;
}
.tag {
  font-family: 'Cinzel', serif;
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  padding: 0.18rem 0.5rem;
  border: 1px solid var(--card-accent, var(--gold-dark));
  color: var(--card-accent, var(--gold-dark));
  opacity: 0.8;
}
.card-desc {
  font-size: 0.68rem;
  color: rgba(201,162,39,0.55);
  font-style: italic;
  line-height: 1.4;
  /* Truncate to 3 lines */
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Card footer */
.card-footer {
  position: relative; z-index: 10;
  padding: 0.5rem 0.9rem;
  background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.5) 100%);
  border-top: 1px solid var(--card-accent, rgba(139,105,20,0.4));
  display: flex; align-items: center; justify-content: space-between;
  gap: 0.5rem;
}
.footer-source {
  font-size: 0.62rem;
  color: rgba(201,162,39,0.4);
  font-style: italic;
  letter-spacing: 0.04em;
}
.badge {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--card-accent, var(--gold));
  border: 1px solid var(--card-accent, var(--gold-dark));
  padding: 0.15rem 0.5rem;
  letter-spacing: 0.06em;
  flex-shrink: 0;
}

/* ── MONSTER CARDS ───────────────────────────────────────────────── */
.monsters-section .card-wrap { height: 380px; }
.monsters-section .card { height: 100%; display: flex; flex-direction: column; }
.monsters-section .card-body { flex: 1; display: flex; align-items: center; justify-content: center; }
.art-glyph { font-size: 4.5rem; opacity: 0.07; user-select: none; }
.art-image {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center top;
  opacity: 0.8; transition: opacity 0.3s;
}
.card-wrap:hover .art-image { opacity: 0.95; }

/* Type gradients */
.type-aberration  .card { background: radial-gradient(ellipse at 35% 35%, #1a0530 0%, #07070d 70%); }
.type-beast       .card { background: radial-gradient(ellipse at 50% 25%, #0d1a05 0%, #07070d 70%); }
.type-celestial   .card { background: radial-gradient(ellipse at 65% 20%, #04082a 0%, #07070d 70%); }
.type-construct   .card { background: radial-gradient(ellipse at 50% 50%, #0e0e1c 0%, #07070d 70%); }
.type-dragon      .card { background: radial-gradient(ellipse at 30% 20%, #2a0505 0%, #07070d 70%); }
.type-elemental   .card { background: radial-gradient(ellipse at 50% 25%, #1c0d04 0%, #07070d 70%); }
.type-fey          .card { background: radial-gradient(ellipse at 50% 30%, #1c051c 0%, #07070d 70%); }
.type-fiend       .card { background: radial-gradient(ellipse at 30% 25%, #2a0202 0%, #07070d 70%); }
.type-giant       .card { background: radial-gradient(ellipse at 50% 40%, #120d02 0%, #07070d 70%); }
.type-humanoid    .card { background: radial-gradient(ellipse at 50% 25%, #050b14 0%, #07070d 70%); }
.type-monstrosity .card { background: radial-gradient(ellipse at 40% 25%, #081406 0%, #07070d 70%); }
.type-undead      .card { background: radial-gradient(ellipse at 40% 30%, #051008 0%, #07070d 70%); }

/* ── MODAL ───────────────────────────────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(4,3,10,0.9);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  align-items: center; justify-content: center; padding: 1.5rem;
}
.modal-overlay.open { display: flex; }
.modal-inner {
  position: relative;
  background: var(--parchment);
  border: 2px solid #7a5c22;
  border-radius: 10px;
  width: 100%; max-width: 580px; max-height: 88vh;
  display: flex; flex-direction: column;
  box-shadow: 0 0 0 1px rgba(139,105,20,0.3), 0 28px 90px rgba(0,0,0,0.85);
  overflow: hidden;
  animation: modalIn 0.22s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.93) translateY(12px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-inner::before {
  content: ''; position: absolute; inset: 0; border-radius: 9px;
  background-image:
    radial-gradient(ellipse at 25% 20%, rgba(255,255,255,0.28) 0%, transparent 50%),
    radial-gradient(ellipse at 75% 80%, rgba(0,0,0,0.08) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
}
.modal-inner::after {
  content: ''; position: absolute; inset: 5px;
  border: 1px solid rgba(122,92,34,0.35); border-radius: 7px;
  pointer-events: none; z-index: 20;
}
.modal-close {
  position: absolute; top: 9px; right: 11px; z-index: 30;
  background: none; border: 1px solid rgba(107,16,16,0.3); border-radius: 4px;
  color: var(--crimson); font-size: 0.8rem; cursor: pointer;
  padding: 2px 8px; line-height: 1.5;
  font-family: 'Cinzel', serif;
  transition: background 0.15s;
}
.modal-close:hover { background: rgba(107,16,16,0.1); }
.modal-content {
  padding: 1rem 1.2rem 1.2rem;
  overflow-y: auto; flex: 1;
  color: var(--ink); position: relative; z-index: 5;
  scrollbar-width: thin; scrollbar-color: var(--parchment-drk) transparent;
}
.modal-content::-webkit-scrollbar { width: 4px; }
.modal-content::-webkit-scrollbar-thumb { background: var(--parchment-drk); border-radius: 2px; }

/* Stat block styles inside modal */
.sb-name { font-family:'Cinzel',serif; font-size:1.25rem; font-weight:700; color:var(--crimson); text-align:center; }
.sb-subtitle { font-style:italic; text-align:center; font-size:0.78rem; color:#3d2010; margin-bottom:0.3rem; }
.sb-div { display:flex; align-items:center; gap:0.4rem; margin:0.35rem 0; color:var(--crimson); opacity:0.5; font-size:0.55rem; letter-spacing:0.3em; }
.sb-div::before,.sb-div::after { content:''; flex:1; height:1px; background:currentColor; opacity:0.6; }
.sb-core p { margin:0.1rem 0; font-size:0.8rem; }
.ability-table { width:100%; border-collapse:collapse; margin:0.3rem 0; text-align:center; }
.ability-table th { font-family:'Cinzel',serif; font-size:0.58rem; color:var(--crimson); font-weight:700; letter-spacing:0.06em; padding:2px; border-bottom:1px solid rgba(107,16,16,0.25); }
.ability-table td { font-size:0.72rem; padding:2px; color:var(--ink); }
.sb-extras p { margin:0.12rem 0; font-size:0.78rem; }
.sb-extras strong { color:#2a1a06; }
.sb-section-title { font-family:'Cinzel',serif; font-size:0.72rem; font-weight:600; color:var(--crimson); letter-spacing:0.06em; margin-top:0.5rem; margin-bottom:0.2rem; padding-bottom:2px; border-bottom:1px solid rgba(107,16,16,0.25); }
.sb-section-content { font-size:0.76rem; color:var(--ink); line-height:1.45; }
.sb-section-content p { margin-bottom:0.22rem; }
.compass-rose { text-align:center; color:var(--gold-dark); font-size:1.2rem; opacity:0.4; }

/* Generic modal content for non-monsters */
.modal-title { font-family:'Cinzel',serif; font-size:1.2rem; color:var(--crimson); text-align:center; margin-bottom:0.2rem; }
.modal-meta { font-style:italic; text-align:center; font-size:0.78rem; color:#5a3a1a; margin-bottom:0.6rem; }
.modal-desc { font-size:0.8rem; color:var(--ink); line-height:1.55; }
.modal-desc p { margin-bottom:0.4rem; }
.modal-prop { font-size:0.78rem; color:var(--ink); margin:0.2rem 0; }
.modal-prop strong { color:#3a1a06; }
.modal-section { margin-top:0.8rem; }
.modal-section h3 { font-family:'Cinzel',serif; font-size:0.72rem; color:var(--crimson); letter-spacing:0.06em; border-bottom:1px solid rgba(107,16,16,0.25); padding-bottom:2px; margin-bottom:0.35rem; }

/* ── RARITY COLORS ───────────────────────────────────────────────── */
.rarity-common    { --card-accent: #aaaaaa; --card-name-color: #cccccc; }
.rarity-uncommon  { --card-accent: #1eff00; --card-name-color: #5eff5e; }
.rarity-rare      { --card-accent: #0070dd; --card-name-color: #5aadff; }
.rarity-very-rare { --card-accent: #a335ee; --card-name-color: #cc88ff; }
.rarity-legendary { --card-accent: #ff8000; --card-name-color: #ffb060; }
.rarity-artifact  { --card-accent: #e6cc80; --card-name-color: #ffe0a0; }

/* Section accent borders */
.section-spells    .card { --card-accent: var(--accent-spells); --card-name-color: #a8c4e8; }
.section-magic     .card { --card-accent: var(--accent-magic); --card-name-color: #c4a8d8; }
.section-equipment .card { --card-accent: var(--accent-equipment); --card-name-color: #a8c8a8; }
.section-backgrounds .card { --card-accent: var(--accent-backgrounds); --card-name-color: #d4b894; }
.section-feats     .card { --card-accent: var(--accent-feats); --card-name-color: #d4a0a0; }
.section-subclasses .card { --card-accent: var(--accent-subclasses); --card-name-color: #a0d4d0; }

/* ── RESPONSIVE ──────────────────────────────────────────────────── */
@media (max-width: 640px) {
  .card-grid { grid-template-columns: 1fr; gap: 1.2rem; padding: 0.5rem 1rem 3rem; }
  .controls { padding: 1rem 1rem 0.6rem; }
  input[type="text"] { min-width: 200px; }
  .modal-overlay { padding: 0.75rem; }
}
</style>
</head>
<body>

<header>
  <div class="site-crown">✦ ✦ ✦</div>
  <div class="site-title">Tome of Everything</div>
  <div class="site-sub">A Complete D&D Compendium</div>
</header>

<div class="nav-tabs">
  <button class="nav-tab active" data-section="monsters">⚔ Monsters</button>
  <button class="nav-tab" data-section="spells">✦ Spells</button>
  <button class="nav-tab" data-section="magic_items">◈ Magic Items</button>
  <button class="nav-tab" data-section="equipment">⚒ Equipment</button>
  <button class="nav-tab" data-section="backgrounds">📜 Backgrounds</button>
  <button class="nav-tab" data-section="feats">★ Feats</button>
  <button class="nav-tab" data-section="subclasses">⚜ Subclasses</button>
</div>

<div class="header-divider"></div>

<div class="controls" id="controls"></div>
<div class="stats-bar" id="statsBar">Consulting the ancient tomes…</div>

<div class="card-grid" id="cardGrid">
  <div class="loading">Summoning entries<br><div class="loading-ring"></div></div>
</div>

<div id="cardModal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-inner">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent" class="modal-content"></div>
  </div>
</div>

<script>
const REPO   = 'andromedajolan/my-dnd';
const BRANCH = 'main';
const BASE = `https://cdn.jsdelivr.net/gh/${REPO}@${BRANCH}`;
const RAW    = ``;

// ── IMAGE HELPERS ─────────────────────────────────────────────────
function rarityImg(r) {
  if (!r) return 'Common';
  const lo = r.toLowerCase().trim();
  if (lo.includes('legendary')) return 'Legendary';
  if (lo.includes('artifact')) return 'Legendary';
  if (lo.includes('very rare')) return 'Very Rare';
  if (lo.includes('rare')) return 'Rare';
  if (lo.includes('uncommon')) return 'Uncommon';
  if (lo.includes('common')) return 'Common';
  return 'Common';
}
function spellImgSrc(s) {
  const school = (s.school || 'Evocation').trim();
  return `${BASE}/Images/Spell Schools/${school.charAt(0).toUpperCase() + school.slice(1).toLowerCase()}.png`;
}
function magicItemImgSrc(mi) {
  const type = (mi.type || '').toLowerCase();
  const r = rarityImg(mi.rarity);
  if (type.includes('scroll') || type.startsWith('sc|')) return `${BASE}/Images/Scrolls/${r} Scroll.png`;
  if (type.includes('wand') || type.startsWith('wd|')) return `${BASE}/Images/Wands/${r} Focus.png`;
  if (type.includes('rod') || type.startsWith('rd|')) return `${BASE}/Images/Wands/${r} Focus.png`;
  if (type.includes('staff') || type.includes('spellcasting focus')) return `${BASE}/Images/Wands/${r} Focus.png`;
  if (type.includes('ring') || type.startsWith('rg|')) return `${BASE}/Images/Rings/${r} Wonder.png`;
  if (type.includes('armor (shield)') || type === 'shield' || type.startsWith('s|')) return `${BASE}/Images/Shields/${r} Shield.png`;
  if (type.includes('armor') || type === 'light armor' || type === 'medium armor' || type === 'heavy armor') return `${BASE}/Images/Armor/${r} Armor.png`;
  if (type === 'melee weapon' || type.includes('weapon (') || type.startsWith('m|')) return `${BASE}/Images/Weapons/${r} Melee.png`;
  if (type === 'ranged weapon' || type.includes('ammunition')) return `${BASE}/Images/Ranged/${r} Ranged.png`;
  if (type.includes('potion') || type.startsWith('p|')) return `${BASE}/Images/Items/${r} Consumable.png`;
  if (type === 'gear' || type.includes('instrument')) return `${BASE}/Images/Adventuring Gear/${r} Gear.png`;
  if (type === 'oth' || type === 'other') return 'Images/Other/Other.png';
  if ((mi.rarity || '').toLowerCase() === 'artifact') return `${BASE}/Images/Other/${r} Artifact.png`;
  // Wondrous Item → Crystal image by rarity
  if (type.includes('wondrous')) {
    const crystalMap = {
      'Legendary': 'Dawn Crystal',
      'Very Rare': 'Forge Crystal',
      'Rare':      'Tempest Crystal',
      'Uncommon':  'Wild Crystal',
      'Common':    'Justice Crystal'
    };
    const crystal = crystalMap[r] || 'Wild Crystal';
    return `${BASE}/Images/Crystals/${crystal}.png`;
  }
  // Anything else → Wonder
  return `${BASE}/Images/Items/${r} Consumable.png`;
}
function equipmentImgSrc(e) {
  const cat = (e.category || '').toLowerCase();
  const sub = (e.subtype || '').toLowerCase();
  if (cat === 'weapon' || cat === 'melee weapon') {
    return sub.includes('ranged') ? `${BASE}/Images/Ranged/Common Ranged.png` : `${BASE}/Images/Weapons/Common Melee.png`;
  }
  if (cat === 'ranged weapon' || sub.includes('ranged')) return `${BASE}/Images/Ranged/Common Ranged.png`;
  if (cat.includes('armor')) return `${BASE}/Images/Armor/Common Armor.png`;
  if (cat === 'shield') return `${BASE}/Images/Shields/Common Shield.png`;
  if (cat === 'staff' || cat === 'spellcasting focus') return `${BASE}/Images/Wands/Common Focus.png`;
  return `${BASE}/Images/Adventuring Gear/Common Gear.png`;
}

};

// ── STATE ─────────────────────────────────────────────────────────

// ── MONSTER HELPERS ───────────────────────────────────────────────
const KNOWN_TYPES = ['aberration','beast','celestial','construct','dragon',
  'elemental','fey','fiend','giant','humanoid','monstrosity','ooze','plant','undead'];
const TYPE_GLYPH = {
  aberration:'👁',beast:'🐺',celestial:'✦',construct:'⚙',dragon:'🐉',
  elemental:'🔥',fey:'✧',fiend:'☠',giant:'⚔',humanoid:'⚔',
  monstrosity:'🦎',ooze:'◉',plant:'🌿',undead:'💀',unknown:'✦'
};
function typeKey(t) {
  if (!t) return 'unknown';
  const lo = (typeof t === 'string' ? t : t.type || '').toLowerCase();
  return KNOWN_TYPES.find(x => lo.includes(x)) || 'unknown';
}
function crSort(v) {
  if (v==='1/8') return 0.125; if (v==='1/4') return 0.25; if (v==='1/2') return 0.5;
  return parseFloat(v) || 0;
}
function scoreAndMod(n) {
  const v = parseInt(n);
  if (isNaN(v)) return '—';
  const m = Math.floor((v-10)/2);
  return `${v} (${m>=0?'+':''}${m})`;
}
function renderMd(text) {
  if (!text) return '';
  text = text.replace(/\{@atk[r]?\s+[^}]*\}/g, '')
             .replace(/\{@hit\s+(\d+)\}/g, '+$1')
             .replace(/\{@h\}/g, '')
             .replace(/\{@hom\}/g, '')
             .replace(/\{@damage\s+([^}]+)\}/g, '$1')
             .replace(/\{@dc\s+(\d+)\}/g, 'DC $1')
             .replace(/\{@condition\s+([^}|]+)[^}]*\}/g, '$1')
             .replace(/\{@spell\s+([^}|]+)[^}]*\}/g, '$1')
             .replace(/\{@creature\s+([^}|]+)[^}]*\}/g, '$1')
             .replace(/\{@skill\s+([^}|]+)[^}]*\}/g, '$1')
             .replace(/\{@action\s+([^}|]+)[^}]*\}/g, '$1')
             .replace(/\{@item\s+([^}|]+)[^}]*\}/g, '$1')
             .replace(/\{@\w+\s+([^}|]+)[^}]*\}/g, '$1')
             .replace(/\{@\w+\}/g, '');
  return text
    .replace(/\*{3}([^*]+)\*{3}/g,'<strong>$1</strong>')
    .replace(/\*{2}([^*]+)\*{2}/g,'<strong>$1</strong>')
    .replace(/\*([^*\n]+)\*/g,'<em>$1</em>')
    .replace(/\n{2,}/g,'</p><p>')
    .replace(/\n/g,' ');
}

// ── RARITY ───────────────────────────────────────────────────────
// ── NORMALIZE MAGIC ITEMS DATA ────────────────────────────────────
// Magic item JSON uses multiple formats:
//   1) Clean fields: type, rarity, attunement set correctly
//   2) Embedded header: description starts with *Type, Rarity (Attunement)*
//      (header must be parsed and stripped regardless of whether type is set,
//       because some items have truncated/incorrect pre-set type values)
//   3) Shortcode types: e.g. RD|DMG → Rod, WD|DMG → Wand, RG|XDMG → Ring
const _TYPE_CODES = {
  'RD':'Rod','WD':'Wand','RG':'Ring','SC':'Scroll','P':'Potion',
  'S':'Shield','M':'Weapon','A':'Ammunition','AT':'Artisan Tool',
  'GS':'Gaming Set','HA':'Heavy Armor','INS':'Instrument',
  'LA':'Light Armor','MA':'Medium Armor','MNT':'Mount',
  'OTH':'Other','T':'Tool','VEH':'Vehicle'
};
function normalizeMagicItem(mi) {
  // 1. Strip **bold markdown** from names
  mi.name = mi.name.replace(/\*\*/g, '').trim();

  // 2. Decode shortcode types (e.g. RD|DMG → Rod)
  if (mi.type && mi.type.includes('|')) {
    const code = mi.type.split('|')[0];
    mi.type = _TYPE_CODES[code] || mi.type;
  }

  // 3. Re-parse description header if present — always, even if type is set,
  //    because some source items have truncated/incorrect type values pre-baked in.
  if (!mi.description || !mi.description.startsWith('*')) return;
  const m = mi.description.match(  /^\*([^*]+)\*\s*([\s\S]*)/);
  if (!m) return;
  const header = m[1].trim();
  const rest   = m[2].trim();

  // Find first comma at paren-depth 0 to split "Type" from "Rarity (Attunement)"
  let depth = 0, commaPos = -1;
  for (let i = 0; i < header.length; i++) {
    if (header[i] === '(') depth++;
    else if (header[i] === ')') depth--;
    else if (header[i] === ',' && depth === 0) { commaPos = i; break; }
  }
  if (commaPos === -1) return;

  const typeStr   = header.substring(0, commaPos).trim();
  const rarityStr = header.substring(commaPos + 1).trim();
  const atm = rarityStr.match(/^(.*?)\s*\(([^)]+)\)\s*$/);
  if (atm) {
    mi.type            = typeStr;
    mi.rarity          = atm[1].trim();
    mi.attunement      = true;
    mi.attunement_note = atm[2].trim();
  } else {
    mi.type       = typeStr;
    mi.rarity     = rarityStr;
    mi.attunement = false;
  }
  mi.description = rest;
}

function rarityClass(r) {
  if (!r) return '';
  const lo = r.toLowerCase().replace(/\s+/g,'-');
  return `rarity-${lo}`;
}
function rarityLabel(r) {
  if (!r || r==='none') return '';
  return r.charAt(0).toUpperCase()+r.slice(1);
}

// ── LOAD DATA ─────────────────────────────────────────────────────
async function loadSection(section) {
  if (allData[section]) return allData[section];
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = `<div class="loading">Loading ${section.replace('_',' ')}…<div class="loading-ring"></div></div>`;

  // Try localStorage cache first
  const cacheKey = `tome_${section}`;
  try {
    const cached = localStorage.getItem(cacheKey);
    if (cached) {
      allData[section] = JSON.parse(cached);
      return allData[section];
    }
  } catch(e) { /* ignore cache errors */ }

  try {
    const res = await fetch(DATA_FILES[section]);
    if (!res.ok) throw new Error(res.status);
    allData[section] = await res.json();
    if (section === 'magic_items') allData[section].forEach(normalizeMagicItem);
    // Cache in localStorage
    try { localStorage.setItem(cacheKey, JSON.stringify(allData[section])); } catch(e) { /* quota exceeded */ }
    return allData[section];
  } catch(e) {
    grid.innerHTML = `<div class="empty">Failed to load ${section}.<br><small>${e.message}</small></div>`;
    return [];
  }
}

};

function buildControls(section) {
  const container = document.getElementById('controls');
  container.innerHTML = '';
  const defs = SECTION_CONTROLS[section] || [];
  defs.forEach(def => {
    if (def.type==='search') {
      const wrap = document.createElement('div');
      wrap.className = 'ctrl';
      wrap.innerHTML = `<span class="ctrl-icon">${def.icon}</span>
        <input type="text" id="mainSearch" placeholder="${def.placeholder}">`;
      wrap.querySelector('input').addEventListener('input', e => {
        searchQ = e.target.value.toLowerCase();
        renderCards();
      });
      container.appendChild(wrap);
    } else if (def.type==='select') {
      const wrap = document.createElement('div');
      wrap.className = 'ctrl ctrl-select';
      const sel = document.createElement('select');
      sel.id = def.id;
      sel.innerHTML = `<option value="">${def.label}</option>`;
      sel.addEventListener('change', e => {
        activeFilters[def.field] = e.target.value;
        renderCards();
      });
      wrap.appendChild(sel);
      container.appendChild(wrap);
    }
  });
}

function updateSelectOptions(section) {
  const defs = (SECTION_CONTROLS[section]||[]).filter(d=>d.type==='select');
  defs.forEach(def => {
    const sel = document.getElementById(def.id);
    if (!sel) return;
    const current = sel.value;
    const opts = def.options(displayed);
    sel.innerHTML = `<option value="">${def.label}</option>`;
    opts.forEach(o => {
      const val  = typeof o==='object'?o.value:o;
      const lbl  = typeof o==='object'?o.label:(val.charAt(0).toUpperCase()+val.slice(1));
      sel.innerHTML += `<option value="${val}">${lbl}</option>`;
    });
    if (current) sel.value = current;
  });
}

// ── FILTER ────────────────────────────────────────────────────────
function filterData(data) {
  return data.filter(item => {
    // Search
    if (searchQ && !item.name.toLowerCase().includes(searchQ)) return false;
    // Filters
    for (const [field, val] of Object.entries(activeFilters)) {
      if (!val) continue;
      if (field==='_type') {
        if (typeKey(item.type)!==val) return false;
      } else if (field==='level') {
        if (String(item.level)!==String(val)) return false;
      } else if (field==='rarity') {
        if ((item.rarity||'').toLowerCase()!==val) return false;
      } else {
        if ((item[field]||'').toLowerCase()!==val.toLowerCase()) return false;
      }
    }
    return true;
  });
}

// ── BUILD CARDS ───────────────────────────────────────────────────
function buildMonsterCard(m) {

  const sub = [m.size, mtype ? mtype.charAt(0).toUpperCase() + mtype.slice(1) : '', m.alignment].filter(Boolean).join(' ');
  const imgSrc = m.image ? `${BASE}/${m.image}` : `${BASE}/Images/Monsters/${tk.charAt(0).toUpperCase() + tk.slice(1)}.png`;
  const artHTML = `<img class="art-image" src="${imgSrc}" alt="${m.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div class="art-glyph" style="display:none">${TYPE_GLYPH[tk]||'✦'}</div>`;
  const safe = m.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");

}

function buildSpellCard(s) {

  const tags  = [s.concentration?'Concentration':'', s.ritual?'Ritual':''].filter(Boolean);
  const imgSrc = spellImgSrc(s);

<div class="card-wrap section-spells" onclick="openModal('spells','${safe}')">

      <div class="card-subtitle">${level} ${s.school||''}</div>

function buildMagicItemCard(mi) {
  const safe    = mi.name.replace(/'/g,"\\'");

  const imgSrc  = magicItemImgSrc(mi);

function buildEquipmentCard(e) {
  const safe = e.name.replace(/'/g,"\\'");
  const meta = [e.category, e.subtype].filter(Boolean).join(' · ');
  const imgSrc = equipmentImgSrc(e);
  return `

    </div>

      <span class="footer-source">${e.source||''}</span>
      ${e.cost?`<span class="badge">${e.cost}</span>`:''}

function buildGenericCard(item, section) {
  const safe    = item.name.replace(/'/g,"\\'");
  const sClass  = `section-${section.replace('_items','').replace('_','')}`;
  const subtitle = item.class||item.category||item.school||'';
  const desc    = item.description||'';
  return `
<div class="card-wrap ${sClass}" onclick="openModal('${section}','${safe}')">
  <div class="card">
    <div class="card-header">
      <div class="card-name">${item.name}</div>
      ${subtitle?`<div class="card-subtitle">${subtitle}</div>`:''}
    </div>
    <div class="card-body">
      <div class="card-desc">${desc.slice(0,200)}${desc.length>200?'…':''}</div>
    </div>
    <div class="card-footer">
      <span class="footer-source">${item.source||''}</span>
    </div>
  </div>
</div>`;
}

function buildCard(item, section) {
  if (section==='monsters')    return buildMonsterCard(item);
  if (section==='spells')      return buildSpellCard(item);
  if (section==='magic_items') return buildMagicItemCard(item);
  if (section==='equipment')   return buildEquipmentCard(item);
  return buildGenericCard(item, section);
}

// ── RENDER CARDS ──────────────────────────────────────────────────
function renderCards() {
  const data   = allData[currentSection]||[];
  const filtered = filterData(data);
  displayed = filtered;
  const grid   = document.getElementById('cardGrid');
  const isWide = ['backgrounds','feats','subclasses'].includes(currentSection);
  grid.className = `card-grid${isWide?' wide':''}`;

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">No entries found in the tome…</div>';
  } else {
    grid.innerHTML = filtered.map(item=>buildCard(item,currentSection)).join('');
  }
  document.getElementById('statsBar').textContent =
    `${filtered.length} of ${data.length} entries`;
  updateSelectOptions(currentSection);
}

      </tr>
    </table>`:''}
    ${extras?`<div class="sb-div">✦</div><div class="sb-extras">${extras}</div>`:''}
    ${(m.traits||m.actions||m.bonus_actions||m.reactions||m.legendary_actions)?'<div class="sb-div">✦</div>':''}
    ${sec('Traits',m.traits)}
    ${sec('Actions',m.actions)}
    ${sec('Bonus Actions',m.bonus_actions)}
    ${sec('Reactions',m.reactions)}
    ${sec('Legendary Actions',m.legendary_actions)}
    <div class="compass-rose" style="margin-top:0.6rem">✦</div>`;
}

function buildSpellModal(s) {
  const level = s.level===0?'Cantrip':`${s.level}${['','st','nd','rd'][s.level]||'th'}-level`;
  return `
    <div class="compass-rose">✦</div>
    <div class="modal-title">${s.name}</div>
    <div class="modal-meta">${level} ${s.school||''}${s.ritual?' (ritual)':''}</div>
    <div class="sb-div">✦</div>
    <div class="sb-core">
      <p><strong>Casting Time</strong> ${s.casting_time||'—'}</p>
      <p><strong>Range</strong> ${s.range||'—'}</p>
      <p><strong>Components</strong> ${s.components||'—'}</p>
      <p><strong>Duration</strong> ${s.duration||'—'}${s.concentration?' (Concentration)':''}</p>
      ${(s.classes||[]).length?`<p><strong>Classes</strong> ${s.classes.join(', ')}</p>`:''}
    </div>
    <div class="sb-div">✦</div>
    <div class="modal-desc"><p>${renderMd(s.description||'')}</p></div>
    ${s.higher_levels?`<div class="modal-section"><h3>At Higher Levels</h3><div class="modal-desc"><p>${renderMd(s.higher_levels)}</p></div></div>`:''}
    <div class="compass-rose" style="margin-top:0.6rem">✦</div>`;
}

function buildMagicItemModal(mi) {
  return `
    <div class="compass-rose">✦</div>
    <div class="modal-title">${mi.name}</div>
    <div class="modal-meta">${[mi.type, rarityLabel(mi.rarity), mi.attunement?mi.attunement_note||'requires attunement':''].filter(Boolean).join(' · ')}</div>
    <div class="sb-div">✦</div>
    <div class="modal-desc"><p>${renderMd(mi.description||'')}</p></div>
    <div class="compass-rose" style="margin-top:0.6rem">✦</div>`;
}

function buildEquipmentModal(e) {
  return `
    <div class="compass-rose">✦</div>
    <div class="modal-title">${e.name}</div>
    <div class="modal-meta">${[e.category, e.subtype].filter(Boolean).join(' · ')}</div>
    <div class="sb-div">✦</div>
    <div class="sb-core">
      ${e.cost?`<p><strong>Cost</strong> ${e.cost}</p>`:''}
      ${e.weight?`<p><strong>Weight</strong> ${e.weight}</p>`:''}
      ${e.damage?`<p><strong>Damage</strong> ${e.damage}</p>`:''}
      ${e.armor_class?`<p><strong>Armor Class</strong> ${e.armor_class}</p>`:''}
      ${e.properties?`<p><strong>Properties</strong> ${e.properties}</p>`:''}
      ${e.mastery?`<p><strong>Mastery</strong> ${e.mastery}</p>`:''}
    </div>
    ${e.description?`<div class="sb-div">✦</div><div class="modal-desc"><p>${renderMd(e.description)}</p></div>`:''}
    <div class="compass-rose" style="margin-top:0.6rem">✦</div>`;
}

function buildSubclassModal(s) {
  const features = (s.features||[]).map(f=>`
    <div class="modal-section">
      <h3>${f.name}${f.level?` (Level ${f.level})`:''}</h3>
      <div class="modal-desc"><p>${renderMd(f.text||'')}</p></div>
    </div>`).join('');
  return `
    <div class="compass-rose">✦</div>
    <div class="modal-title">${s.name}</div>
    <div class="modal-meta">${s.class||''} Subclass · ${s.source||''}</div>
    <div class="sb-div">✦</div>
    ${features}
    <div class="compass-rose" style="margin-top:0.6rem">✦</div>`;
}

function buildGenericModal(item) {
  return `
    <div class="compass-rose">✦</div>
    <div class="modal-title">${item.name}</div>
    ${item.category||item.class?`<div class="modal-meta">${[item.category||item.class, item.prerequisite, item.source].filter(Boolean).join(' · ')}</div>`:''}
    <div class="sb-div">✦</div>
    <div class="modal-desc"><p>${renderMd(item.description||'')}</p></div>
    <div class="compass-rose" style="margin-top:0.6rem">✦</div>`;
}

function openModal(section, name) {
  const data = allData[section]||[];
  const item = data.find(x=>x.name===name);
  if (!item) return;
  const content = document.getElementById('modalContent');
  if (section==='monsters')    content.innerHTML = buildMonsterModal(item);
  else if (section==='spells') content.innerHTML = buildSpellModal(item);
  else if (section==='magic_items') content.innerHTML = buildMagicItemModal(item);
  else if (section==='equipment')   content.innerHTML = buildEquipmentModal(item);
  else if (section==='subclasses')  content.innerHTML = buildSubclassModal(item);
  else content.innerHTML = buildGenericModal(item);
  content.scrollTop = 0;
  document.getElementById('cardModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('cardModal').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

// ── SECTION SWITCH ────────────────────────────────────────────────
async function switchSection(section) {
  currentSection = section;
  searchQ        = '';
  activeFilters  = {};

  // Update tabs
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.section===section);
  });

  // Build controls
  buildControls(section);

  // Load + render
  const grid = document.getElementById('cardGrid');
  if (!allData[section]) {
    grid.innerHTML = `<div class="loading">Loading…<div class="loading-ring"></div></div>`;
    await loadSection(section);
  }
  renderCards();
}

// ── INIT ──────────────────────────────────────────────────────────
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => switchSection(tab.dataset.section));
});

switchSection('monsters');
</script>
</body>
